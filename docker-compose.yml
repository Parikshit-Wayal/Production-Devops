version: '3.8'

services:
  backend-service:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo-db:27017/minimalShop # Internal network resolution
      - JWT_SECRET=superminimalcryptokey99
      - PORT=5000
    depends_on:
      - mongo-db

  frontend-service:
    build: ./minimal-shop-frontend
    ports:
      - "5173:80" # Mapping container's Nginx port 80 to host port 5173
    depends_on:
      - backend-service

  mongo-db:
    image: mongo:latest
    ports:
      - "27017:27017"