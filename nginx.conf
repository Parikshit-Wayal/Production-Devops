server {
    listen 80;

    # 1. Route Frontend UI
    location / {
        proxy_pass http://shop-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Route Auth Service
    location /api/auth/ {
        proxy_pass http://shop-auth:5001/api/auth/;
        proxy_set_header Host $host;
    }

    # 3. Route Products Service
    location /api/products/ {
        proxy_pass http://shop-products:5002/api/products/;
        proxy_set_header Host $host;
    }

    # 4. Route Cart Service
    location /api/cart/ {
        proxy_pass http://shop-cart:5003/api/cart/;
        proxy_set_header Host $host;
    }

    # 5. Route Orders Service
    location /api/orders/ {
        proxy_pass http://shop-orders:5004/api/orders/;
        proxy_set_header Host $host;
    }
}
